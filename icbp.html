<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📚 算法题单 · 完成追踪</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; font-family: 'Inter', system-ui, sans-serif; }
    body {
      background-image: url('https://img0.baidu.com/it/u=3971580946,1209565587&fm=253&fmt=auto&app=138&f=JPEG?w=889&h=500');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .dashboard {
      max-width: 1600px;
      width: 100%;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr 1.3fr;
      gap: 20px;
      align-items: stretch;
    }
    .card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 20px 18px;
      box-shadow: 0 15px 30px -8px rgba(0,20,50,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      flex-direction: column;
    }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card-header h2 { font-size: 1.35rem; font-weight: 600; color: #1e293b; }
    .badge { background: #e9eef4; padding: 4px 10px; border-radius: 40px; font-size: 0.8rem; color: #334155; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #64748b; margin-bottom: 4px; }
    .form-control { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 18px; font-size: 0.95rem; background: #fafcff; }
    .form-control:focus { border-color: #7c3aed; outline: none; background: white; }
    .difficulty-row { display: flex; gap: 10px; }
    .difficulty-row .form-group { flex: 1; }
    .btn { background: #7c3aed; color: white; border: none; padding: 12px 16px; border-radius: 40px; font-weight: 600; font-size: 1rem; width: 100%; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #692eda; }
    .btn-outline { background: transparent; color: #1e293b; border: 1.5px solid #e2e8f0; padding: 6px 12px; font-size: 0.85rem; cursor: pointer; }
    .difficulty-tag { display: inline-block; padding: 2px 10px; border-radius: 30px; font-weight: 500; font-size: 0.75rem; }
    .diff-0 { background: rgb(209,209,209); color: rgb(69,69,69); }
    .diff-1 { background: rgb(254,76,97); color: white; }
    .diff-2 { background:rgb(243,156,17); color: white; }
    .diff-3 { background: rgb(255,193,22); color: white; }
    .diff-4 { background: rgb(83,196,26); color: white; }
    .diff-5 { background: rgb(52,152,219); color: white; }
    .diff-6 { background: rgb(156,61,207); color: white; }
    .diff-7 { background: rgb(14,29,105); color: white; }
    .method-indicator { display: inline-flex; align-items: center; gap: 4px; }
    .method-dot { width: 8px; height: 8px; border-radius: 8px; background: #64748b; }
    .dot-self { background: #10b981; }
    .dot-solution { background: #f59e0b; }
    .dot-help { background: #3b82f6; }
    .dot-ai { background: #06b6d4; } /* 新加：AI帮助的圆点颜色 */
    .method-text { font-size: 0.8rem; color: #475569; }
    .filter-section { margin-top: 12px; }
    .filter-label { font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .chip { background: #f1f5f9; padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; }
    .chip.active { background: #7c3aed; color: white; border-color: #7c3aed; }
    .chart-wrapper { margin-top: 5px; height: 200px; }
    .stats-grid { display: flex; flex-direction: column; gap: 18px; flex: 1; }
    .stat-number { font-size: 2.5rem; font-weight: 700; color: #0f172a; line-height: 1; }
    .streak-box { background: linear-gradient(145deg, #f1f4fe, #ffffff); border-radius: 28px; padding: 20px; border: 1px solid #e0e7ff; }
    .daily-list, .recent-list { list-style: none; padding: 0; margin-top: 10px; max-height: 260px; overflow-y: auto; }
    .daily-list li, .recent-list li { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #d1d9e6; font-size: 0.9rem; }
    .recent-list li { align-items: flex-start; }
    .date-badge { font-weight: 600; color: #334155; }
    .count-badge { background: #7c3aed20; padding: 3px 10px; border-radius: 40px; color: #7c3aed; font-weight: 600; }
    .recent-item-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .recent-pid { font-weight: 600; font-family: monospace; }
    .recent-pid a { color: #1e293b; text-decoration: none; }
    .recent-pid a:hover { color: #7c3aed; text-decoration: underline; }
    .recent-name { font-size: 0.8rem; color: #475569; }
    .recent-tags { font-size: 0.7rem; color: #64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 2px; max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .delete-btn, .edit-btn { color: #94a3b8; cursor: pointer; font-weight: bold; padding: 6px 8px; background: none; border: none; font-size: 1rem; border-radius: 20px; }
    .delete-btn:hover { color: #dc2626; background: #fee2e2; }
    .edit-btn:hover { color: #3b82f6; background: #e0f2fe; }
    .empty-msg { color: #94a3b8; text-align: center; padding: 25px 0; font-style: italic; }
    footer { font-size: 0.7rem; text-align: right; color: #94a3b8; margin-top: 10px; }
    .section-title { font-size: 1rem; font-weight: 600; margin: 8px 0 4px; color: #1e293b; display: flex; align-items: center; justify-content: space-between; }
    .recent-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .item-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
    .daily-date-row { cursor: pointer; }
    .daily-date-row.today-row { cursor: default; }
    .daily-arrow { font-size: 0.7rem; color:#7c3aed; margin-left:6px; }
    .day-problem-wrap { padding: 6px 0 6px 12px; font-size: 0.8rem; color:#475569; border-bottom: 1px dashed #d1d9e6; display: none; }
    .day-problem-wrap.show { display: block; }
    .daily-problem-item { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
    #edit-modal .card { max-height: 90vh; overflow-y: auto; }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="card">
    <div class="card-header"><h2>📋 加入已完成题目</h2><span class="badge" id="total-count">0 题</span></div>
    <form id="add-problem-form">
      <div class="form-group"><label>题号</label><input type="text" class="form-control" id="pid" placeholder="P1001" required></div>
      <div class="form-group"><label>题目名</label><input type="text" class="form-control" id="pname" placeholder="A+B Problem" required></div>
      <div class="form-group"><label>题目网址 (可选)</label><input type="text" class="form-control" id="url" placeholder="https://www.luogu.com.cn/problem/P1001"></div>
      <div class="form-group"><label>算法标签 (逗号分隔)</label><input type="text" class="form-control" id="tags" placeholder="数学, 字符串"></div>
      <div class="difficulty-row">
        <div class="form-group"><label>难度</label><select class="form-control" id="difficulty"><option value="0">暂无评定</option><option value="1">入门</option><option value="2">普及−</option><option value="3">普及/提高−</option><option value="4" selected>普及+/提高</option><option value="5">提高+/省选−</option><option value="6">省选/NOI−</option><option value="7">NOI/NOI+/CTSC</option></select></div>
        <div class="form-group"><label>个人认为难度</label><select class="form-control" id="self-difficulty"><option value="0">暂无评定</option><option value="1">入门</option><option value="2">普及−</option><option value="3">普及/提高−</option><option value="4" selected>普及+/提高</option><option value="5">提高+/省选−</option><option value="6">省选/NOI−</option><option value="7">NOI/NOI+/CTSC</option></select></div>
      </div>
      <div class="form-group"><label>完成方式</label>
        <div id="method-group" style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px;">
          <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
            <input type="checkbox" value="self" checked> <span>✨ 独立写出</span>
          </label>
          <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
            <input type="checkbox" value="solution"> <span>📖 看了题解</span>
          </label>
          <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
            <input type="checkbox" value="help"> <span>🤝 同学帮助</span>
          </label>
          <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
            <input type="checkbox" value="ai"> <span>🤖 AI 帮助</span>
          </label>
        </div>
      </div>
      <button type="submit" class="btn">➕ 添加题目</button>
    </form>
    <div style="margin-top: 16px; display: flex; justify-content: flex-end;"><button class="btn-outline" id="clear-all-btn" style="width:auto;">🧹 清空所有记录</button></div>
  </div>

  <div class="card">
    <div class="card-header"><h2>📊 做题趋势</h2><span class="badge" id="filtered-count">—</span></div>
    <div>
      <div class="filter-section"><div class="filter-label">🔍 按难度筛选</div><div class="filter-chips" id="filter-container-diff"><div class="chip active" data-diff="all">全部</div><div class="chip" data-diff="0">暂无评定</div><div class="chip" data-diff="1">入门</div><div class="chip" data-diff="2">普及−</div><div class="chip" data-diff="3">普及/提高−</div><div class="chip" data-diff="4">普及+/提高</div><div class="chip" data-diff="5">提高+/省选−</div><div class="chip" data-diff="6">省选/NOI−</div><div class="chip" data-diff="7">NOI/NOI+/CTSC</div></div></div>
      <div class="filter-section"><div class="filter-label">📌 按完成方式筛选</div><div class="filter-chips" id="filter-container-method">
        <div class="chip active" data-method="all">全部</div>
        <div class="chip" data-method="self">✨ 独立写出</div>
        <div class="chip" data-method="solution">📖 看了题解</div>
        <div class="chip" data-method="help">🤝 同学帮助</div>
        <div class="chip" data-method="ai">🤖 AI 帮助</div>
      </div></div>
    </div>
    <div class="chart-wrapper"><canvas id="trendChart"></canvas></div>
    <footer>每日完成题目数（最近7天）</footer>
  </div>

  <div class="card">
    <div class="card-header"><h2>📅 连续记录 & 摘要</h2></div>
    <div class="stats-grid">
      <div class="streak-box"><div style="font-size:0.9rem; color:#475569;">🔥 当前连续天数</div><div class="stat-number" id="streak-days">0</div><div style="display:flex; gap:20px; margin-top:10px;"><div><span style="color:#64748b;">总完成</span><br><span id="total-solved" style="font-weight:700; font-size:1.6rem;">0</span></div><div><span style="color:#64748b;">平均自评</span><br><span id="avg-self" style="font-weight:700; font-size:1.6rem;">-</span></div></div></div>
      <div><div class="section-title">📆 每日题量（近7天）</div><ul class="daily-list" id="daily-list-container"><li class="empty-msg">加载中...</li></ul></div>
      <div style="margin-top: 8px;"><div class="section-title"><span>🆕 最近添加的题目</span></div><ul class="recent-list" id="recent-list-container"><li class="empty-msg">暂无题目</li></ul></div>
    </div>
  </div>
</div>

<!-- 编辑模态框 -->
<div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index:1000; align-items:center; justify-content:center;">
  <div class="card" style="width: min(90%, 450px); margin: auto; padding: 24px;">
    <div class="card-header"><h2>✏️ 编辑题目</h2><button id="close-modal" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button></div>
    <div class="form-group"><label>题号</label><input type="text" id="edit-pid" class="form-control" required></div>
    <div class="form-group"><label>题目名</label><input type="text" id="edit-pname" class="form-control" required></div>
    <div class="form-group"><label>题目网址</label><input type="text" id="edit-url" class="form-control"></div>
    <div class="form-group"><label>算法标签 (逗号分隔)</label><input type="text" id="edit-tags" class="form-control"></div>
    <div class="difficulty-row">
      <div class="form-group"><label>难度</label><select id="edit-difficulty" class="form-control"><option value="0">暂无评定</option><option value="1">入门</option><option value="2">普及−</option><option value="3">普及/提高−</option><option value="4">普及+/提高</option><option value="5">提高+/省选−</option><option value="6">省选/NOI−</option><option value="7">NOI/NOI+/CTSC</option></select></div>
      <div class="form-group"><label>个人认为难度</label><select id="edit-self-difficulty" class="form-control"><option value="0">暂无评定</option><option value="1">入门</option><option value="2">普及−</option><option value="3">普及/提高−</option><option value="4">普及+/提高</option><option value="5">提高+/省选−</option><option value="6">省选/NOI−</option><option value="7">NOI/NOI+/CTSC</option></select></div>
    </div>
    <div class="form-group"><label>完成方式</label>
      <div id="edit-method-group" style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px;">
        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
          <input type="checkbox" value="self"> <span>✨ 独立写出</span>
        </label>
        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
          <input type="checkbox" value="solution"> <span>📖 看了题解</span>
        </label>
        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
          <input type="checkbox" value="help"> <span>🤝 同学帮助</span>
        </label>
        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
          <input type="checkbox" value="ai"> <span>🤖 AI 帮助</span>
        </label>
      </div>
    </div>
    <button id="save-edit-btn" class="btn" style="margin-top:10px;">💾 保存修改</button>
  </div>
</div>

<script>
  (function(){
    let problems = [];
    const STORAGE_KEY = 'algo_tracker_problems_v7';
    const DIFF_MAP = {0:'暂无评定',1:'入门',2:'普及−',3:'普及/提高-',4:'普及+/提高',5:'提高+/省选-',6:'省选/NOI-',7:'NOI/NOI+/CTSC'};
    const METHOD_MAP = {
      self:{label:'独立写出',dotClass:'dot-self',emoji:'✨'},
      solution:{label:'看了题解',dotClass:'dot-solution',emoji:'📖'},
      help:{label:'同学帮助',dotClass:'dot-help',emoji:'🤝'},
      ai:{label:'AI帮助',dotClass:'dot-ai',emoji:'🤖'}
    };
    let currentDiffFilter = 'all';
    let selectedMethodFilters = []; // 改为数组，支持多选
    let currentEditId = null;

    function loadFromStorage() { 
      const stored = localStorage.getItem(STORAGE_KEY); 
      if(stored) { 
        try{ 
          problems = JSON.parse(stored); 
          // 兼容旧数据：如果是单选字符串，转成数组
          problems = problems.map(p => {
            if (!p.method) p.method = ['self'];
            if (typeof p.method === 'string') p.method = [p.method];
            return p;
          });
        }catch(e){} 
      } 
    }
    function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(problems)); }
    function getTodayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function getLastNDays(n) { const dates=[]; const today=new Date(); for(let i=n-1;i>=0;i--){ const d=new Date(today); d.setDate(today.getDate()-i); dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`); } return dates; }
    function filterProblems() { 
      return problems.filter(p=>{ 
        if(currentDiffFilter!=='all' && p.difficulty!==parseInt(currentDiffFilter)) return false; 
        // 多选过滤逻辑
        if(selectedMethodFilters.length > 0) {
          // 检查 p.method 是否包含任意一个选中的标签
          let hasMatch = false;
          for (let m of p.method) {
            if (selectedMethodFilters.includes(m)) {
              hasMatch = true; 
              break;
            }
          }
          if (!hasMatch) return false;
        }
        return true; 
      }); 
    }
    function computeStreak(allProblems) { if(allProblems.length===0) return 0; const dateSet=new Set(allProblems.map(p=>p.date)); let streak=0; let checkDate=new Date(getTodayStr()); while(true){ const dStr=checkDate.toISOString().slice(0,10); if(dateSet.has(dStr)){ streak++; checkDate.setDate(checkDate.getDate()-1); }else break; } return streak; }
    function escapeHtml(t){ if(!t) return ''; return String(t).replace(/[&<>]/g, function(c){ if(c==='&') return '&amp;'; if(c==='<') return '&lt;'; if(c==='>') return '&gt;'; return c;}); }

    let chartInstance = null;
    const ctx = document.getElementById('trendChart').getContext('2d');

    function refreshUI() {
      document.getElementById('total-count').innerText = problems.length + ' 题';
      document.getElementById('total-solved').innerText = problems.length;
      if(problems.length>0){ const avg = problems.reduce((s,p)=>s+p.selfDiff,0)/problems.length; document.getElementById('avg-self').innerText = avg.toFixed(1); } else { document.getElementById('avg-self').innerText = '-'; }

      const filtered = filterProblems();
      document.getElementById('filtered-count').innerText = filtered.length + ' 题';
      const last7 = getLastNDays(7);
      const counts = last7.map(d => filtered.filter(p=>p.date===d).length);
      if(chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, { type:'line', data:{ labels:last7.map(d=>d.slice(5)), datasets:[{ label:'完成题数', data:counts, borderColor:'#7c3aed', backgroundColor:'#7c3aed20', borderWidth:3, pointBackgroundColor:'#1e293b', pointBorderColor:'#ffffff', pointRadius:4, tension:0.2, fill:true }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false }, tooltip:{ backgroundColor:'#0f172a' } }, scales:{ y:{ beginAtZero:true, grid:{ color:'#e9eef4' } }, x:{ grid:{ display:false } } } } });

      const todayStr = getTodayStr();
      const groupByDate = {};
      problems.forEach(p => { if(!groupByDate[p.date]) groupByDate[p.date]=[]; groupByDate[p.date].push(p); });
      const dailyListDiv = document.getElementById('daily-list-container');
      const sortedDates = Array.from(new Set(problems.map(p=>p.date))).sort().reverse();
      if(sortedDates.length===0) dailyListDiv.innerHTML = '<li class="empty-msg">还没有记录</li>';
      else {
        let listHtml = '';
        sortedDates.slice(0,7).forEach(d => {
          const isToday = d===todayStr;
          const dayProblems = groupByDate[d] || [];
          let probHtml = '';
          dayProblems.forEach(item=>{ 
            // 组装多个标签
            let methodStr = item.method.map(m => {
              const mi = METHOD_MAP[m] || METHOD_MAP.self;
              return `${mi.emoji}`;
            }).join(' ');
            probHtml+=`<div class="daily-problem-item"><span>▪</span><span class="recent-pid">${escapeHtml(item.pid)}</span><span class="recent-name">${escapeHtml(item.name)}</span><span class="difficulty-tag diff-${item.difficulty}">原</span><span class="difficulty-tag diff-${item.selfDiff}">自</span><span class="method-text">${methodStr}</span></div>`; 
          });
          listHtml+=`<li class="daily-date-row ${isToday?'today-row':''}" data-day="${d}"><span class="date-badge">${d} ${isToday?'(今日)':'<span class="daily-arrow">▼</span>'}</span><span class="count-badge">${dayProblems.length} 题</span></li><div class="day-problem-wrap" data-wrap="${d}">${probHtml||'<div style="padding:6px 12px; color:#94a3b8;">无题目</div>'}</div>`;
        });
        dailyListDiv.innerHTML = listHtml;
        document.querySelectorAll('.daily-date-row:not(.today-row)').forEach(row=>{ row.onclick=function(){ const day=this.dataset.day; const wrap=document.querySelector(`.day-problem-wrap[data-wrap="${day}"]`); wrap.classList.toggle('show'); const arrow=this.querySelector('.daily-arrow'); if(arrow) arrow.innerText=wrap.classList.contains('show')?'▲':'▼'; }; });
      }

      const recentListDiv = document.getElementById('recent-list-container');
      if(filtered.length===0) recentListDiv.innerHTML = '<li class="empty-msg">暂无符合筛选的题目</li>';
      else {
        const recent = [...filtered].sort((a,b)=>b.id - a.id).slice(0,10);
        let recentHtml = '';
        recent.forEach(p => {
          const diffName = DIFF_MAP[p.difficulty] || p.difficulty;
          const tagsDisplay = p.tags?.trim() || '无标签';
          // 多标签渲染
          let methodHtml = p.method.map(m => {
            const mi = METHOD_MAP[m] || METHOD_MAP.self;
            return `<span class="method-indicator"><span class="method-dot ${mi.dotClass}"></span><span class="method-text">${mi.emoji} ${mi.label}</span></span>`;
          }).join(' ');
          let problemLink = p.url?.trim() || `https://www.luogu.com.cn/problem/${encodeURIComponent(p.pid)}`;
          recentHtml += `<li>
            <div class="recent-item-info">
              <div style="display:flex; align-items:center; gap:8px;"><span class="recent-pid"><a href="${escapeHtml(problemLink)}" target="_blank">${escapeHtml(p.pid)}</a></span>${methodHtml}</div>
              <span class="recent-name">${escapeHtml(p.name)}</span>
              <div class="recent-meta"><span class="recent-tags" title="${escapeHtml(tagsDisplay)}">🏷️ ${escapeHtml(tagsDisplay)}</span></div>
            </div>
            <div class="item-actions">
              <div style="display: flex; align-items: center; gap: 6px;"><span>原难度：</span><span class="difficulty-tag diff-${p.difficulty}">${diffName}</span></div>
              <div style="display: flex; align-items: center; gap: 6px;"><span>自评难度：</span><span class="difficulty-tag diff-${p.selfDiff}">${DIFF_MAP[p.selfDiff]}</span></div>
              <div style="display: flex; gap: 8px; margin-top: 4px;">
                <button class="edit-btn" data-id="${p.id}" title="编辑题目">✏️ 编辑</button>
                <button class="delete-btn" data-id="${p.id}" title="删除题目">🗑️ 删除</button>
              </div>
            </div>
          </li>`;
        });
        recentListDiv.innerHTML = recentHtml;
      }

      document.querySelectorAll('.delete-btn').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const id = Number(btn.dataset.id); problems = problems.filter(p => p.id !== id); saveToStorage(); refreshUI(); }); });
      document.querySelectorAll('.edit-btn').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const id = Number(btn.dataset.id); const problem = problems.find(p => p.id === id); if(!problem) return; currentEditId = id; document.getElementById('edit-pid').value = problem.pid; document.getElementById('edit-pname').value = problem.name; document.getElementById('edit-url').value = problem.url || ''; document.getElementById('edit-tags').value = problem.tags || ''; document.getElementById('edit-difficulty').value = problem.difficulty; document.getElementById('edit-self-difficulty').value = problem.selfDiff; 
            
            // 回显多选状态
            const editMethodGroup = document.getElementById('edit-method-group');
            editMethodGroup.querySelectorAll('input[type="checkbox"]').forEach(cb => {
              cb.checked = problem.method.includes(cb.value);
            });

            document.getElementById('edit-modal').style.display = 'flex'; }); });

      document.getElementById('streak-days').innerText = computeStreak(problems);
    }

    document.getElementById('add-problem-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const pid = document.getElementById('pid').value.trim();
      const pname = document.getElementById('pname').value.trim();
      if(!pid || !pname) { alert('题号和题目名必填'); return; }
      // 获取选中的多个方法
      const checkedMethods = document.querySelectorAll('#method-group input[type="checkbox"]:checked');
      const methods = Array.from(checkedMethods).map(cb => cb.value);
      
      problems.push({ id: Date.now()+Math.floor(Math.random()*1000), pid, name: pname, url: document.getElementById('url').value.trim(), tags: document.getElementById('tags').value.trim(), difficulty: parseInt(document.getElementById('difficulty').value), selfDiff: parseInt(document.getElementById('self-difficulty').value), method: methods, date: getTodayStr() });
      saveToStorage();
      refreshUI();
      document.getElementById('add-problem-form').reset();
      document.getElementById('difficulty').value = '4';
      document.getElementById('self-difficulty').value = '4';
      // 重置方法组默认选中第一个，防止用户不方便
      document.querySelectorAll('#method-group input[type="checkbox"]').forEach(cb => { cb.checked = cb.value === 'self'; });
    });
    document.getElementById('clear-all-btn').addEventListener('click', ()=>{ if(confirm('确定清空所有题目记录吗？')){ problems=[]; saveToStorage(); refreshUI(); } });

    document.querySelectorAll('#filter-container-diff .chip').forEach(chip => { chip.addEventListener('click', () => { document.querySelectorAll('#filter-container-diff .chip').forEach(c=>c.classList.remove('active')); chip.classList.add('active'); currentDiffFilter = chip.dataset.diff; refreshUI(); }); });
    
    // 多选筛选器：点击切换选中状态
    document.querySelectorAll('#filter-container-method .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const method = chip.dataset.method;
        if (method === 'all') {
          selectedMethodFilters = [];
          document.querySelectorAll('#filter-container-method .chip').forEach(c => c.classList.remove('active'));
          document.querySelector('#filter-container-method .chip[data-method="all"]').classList.add('active');
        } else {
          const idx = selectedMethodFilters.indexOf(method);
          if (idx > -1) selectedMethodFilters.splice(idx, 1);
          else selectedMethodFilters.push(method);
          chip.classList.toggle('active');
          // 取消全选的激活
          document.querySelector('#filter-container-method .chip[data-method="all"]').classList.remove('active');
        }
        refreshUI();
      });
    });

    document.getElementById('close-modal').addEventListener('click', () => { document.getElementById('edit-modal').style.display = 'none'; });
    document.getElementById('edit-modal').addEventListener('click', (e) => { if(e.target === document.getElementById('edit-modal')) document.getElementById('edit-modal').style.display = 'none'; });
    document.getElementById('save-edit-btn').addEventListener('click', () => {
      if(currentEditId === null) return;
      const problem = problems.find(p => p.id === currentEditId);
      if(!problem) return;
      problem.pid = document.getElementById('edit-pid').value.trim();
      problem.name = document.getElementById('edit-pname').value.trim();
      problem.url = document.getElementById('edit-url').value.trim();
      problem.tags = document.getElementById('edit-tags').value.trim();
      problem.difficulty = parseInt(document.getElementById('edit-difficulty').value);
      problem.selfDiff = parseInt(document.getElementById('edit-self-difficulty').value);
      
      // 获取多选结果
      const checkedMethods = document.querySelectorAll('#edit-method-group input[type="checkbox"]:checked');
      problem.method = Array.from(checkedMethods).map(cb => cb.value);
      
      saveToStorage();
      refreshUI();
      document.getElementById('edit-modal').style.display = 'none';
      currentEditId = null;
    });

    loadFromStorage();
    refreshUI();
  })();
</script>
</body>
</html>
