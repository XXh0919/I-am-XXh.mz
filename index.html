<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XXh 的工具箱</title>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body {
            /* 换成背景图 */
            background-image: url('https://img2024.cnblogs.com/blog/3603658/202606/3603658-20260623214455123-762285129.jpg');
            background-size: cover;          /* 让图片铺满屏幕 */
            background-position: center;     /* 图片居中显示 */
            background-attachment: fixed;    /* 滚动时背景固定不动 */
            
            /* 再加一个兜底颜色（防止图片加载失败时页面全白） */
            background-color: #e2f3fb;
            
            /* 下面这些保持原样不要动 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }
        .header-title {
            font-size: 2.8rem;
            font-weight: 700;
            color: #2888d8;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .header-title i { font-size: 2.8rem; }
        .header-sub {
            color: #94a3b8;
            font-size: 0.95rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            border-top: 1px solid #94a3b8;
            border-bottom: 1px solid #94a3b8;
            display: inline-block;
            padding: 5px 15px;
        }
        
        /* 网格卡片布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            justify-content: center;
        }

        /* 单张卡片设计 */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0, 50, 100, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
            background: rgba(255, 255, 255, 0.9);
        }

        /* 图标区域 */
        .icon-wrapper {
            width: 68px;
            height: 68px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }
        /* 为不同的工具设置不同的渐变图标底色 */
        .icon-blue { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .icon-orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .icon-green { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .icon-red { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .icon-purple { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }

        .card h3 {
            font-size: 1.15rem;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .card p {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        /* 下拉菜单和按钮样式 */
        .select-wrapper {
            width: 100%;
            margin-bottom: 8px;
        }
        .select-wrapper select {
            width: 90%;
            padding: 6px 8px;
            border-radius: 12px;
            border: 1px solid #d1d9e6;
            background: white;
            font-size: 0.85rem;
            color: #334155;
            outline: none;
        }
        .go-btn, .card-link {
            margin-top: 8px;
            display: inline-block;
            text-decoration: none;
            background: #e2e8f0;
            color: #475569;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .go-btn:hover, .card-link:hover {
            background: #cbd5e1;
        }
        .card-link {
            padding: 8px 25px;
            background: #1e293b;
            color: white;
        }
        .card-link:hover {
            background: #0f172a;
        }
        .footer-tip {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #94a3b8;
            opacity: 0.8;
        }
        /* 强制去掉所有图标的背景色和阴影 */
        .icon-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
        }
        /* 把图标文字改成深色，不然背景图里看不见 */
        .icon-wrapper i {
            color: #1e293b !important; /* 深灰色 */
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-title"><i class="fa-solid fa-toolbox"></i> 快速跳转 </div>
    <div class="header-sub">更便捷的打开方式</div>

    <div class="grid">
        <!-- 卡片 1：做题记录 -->
        <div class="card">
            <div class="icon-wrapper icon-blue"><i class="fa-solid fa-list-check"></i></div>
            <h3>做题记录</h3>
            <p>算法追踪 · 状态记录</p>
            <!-- 如果你把做题工具命名为 index.html，链接就改成 href="/I-am-XXh.mz/" -->
            <a href="/I-am-XXh.mz/icbp.html" class="card-link">📝 进入</a>
        </div>

        <!-- 卡片 2：博客园 -->
        <div class="card">
            <div class="icon-wrapper icon-orange">
                <img src="https://ts1.tc.mm.bing.net/th/id/ODF.J6leVzKhepVCqn16LLjyWg?w=32&h=32&qlt=90&pcl=fffffa&o=6&pid=1.2" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>博客园</h3>
            <p>文章记录 · 学习笔记</p>
            <a href="https://www.cnblogs.com/XXh0919" target="_blank" class="card-link">📖 前往</a>
        </div>

        <!-- 卡片 3：洛谷 -->
        <div class="card">
            <div class="icon-wrapper icon-green">
                <img src="https://ts3.tc.mm.bing.net/th/id/ODF.P3Nk_2KM88QKG-9ZDT9-lw?w=32&h=32&qlt=90&pcl=fffffa&o=6&pid=1.2" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>洛谷</h3>
            <p>国内在线题库</p>
            <a href="https://www.luogu.com.cn/user/814145" target="_blank" class="card-link">💻 前往</a>
        </div>

        <!-- 卡片 4：Codeforces（带下拉框） -->
        <div class="card">
            <div class="icon-wrapper icon-red">
                <img src="https://ts3.tc.mm.bing.net/th/id/ODF.PnqYzRrYxyP7VRy0DAYqsA?w=32&h=32&qlt=92&pcl=fffffa&o=6&pid=1.2" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>Codeforces</h3>
            <p>国外算法比赛</p>
            <div class="select-wrapper">
                <select id="cf-select">
                    <option value="">选择账号</option>
                    <option value="XXh0919">XXh0919</option>
                    <option value="Laoxu0919">Laoxu0919</option>
                </select>
            </div>
            <button class="go-btn" onclick="jumpCF()">🚀 前往</button>
        </div>

        <!-- 卡片 5：AtCoder（带下拉框） -->
        <div class="card">
            <div class="icon-wrapper icon-purple">
                <img src="//img.atcoder.jp/assets/top/img/logo_bk.svg" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>AtCoder</h3>
            <p>国外算法比赛</p>
            <div class="select-wrapper">
                <select id="at-select">
                    <option value="">选择账号</option>
                    <option value="XXh0919">XXh0919</option>
                    <option value="Laoxu0919">Laoxu0919</option>
                </select>
            </div>
            <button class="go-btn" onclick="jumpAt()">🚀 前往</button>
        </div>

        <!-- 留空或者放你的其他个人项目，保持和截图对应的 4 列布局美感 -->
        <div class="card">
            <div class="icon-wrapper icon-blue"><i class="fa-regular fa-lightbulb"></i></div>
            <h3>正在构思</h3>
            <p>更多项目开发中...</p>
            <a href="#" class="go-btn" style="background:#e2e8f0;">敬请期待</a>
        </div>
    </div>
    
    <div class="footer-tip">↑ 点击卡片快速跳转 ↑</div>
</div>

<!-- JS 逻辑：处理下拉框跳转 -->
<script>
    function jumpCF() {
        const val = document.getElementById('cf-select').value;
        if (val) {
            window.open('https://codeforces.com/profile/' + val, '_blank');
        } else {
            alert('请先在下拉框里选择一个 Codeforces 账号！'); // 新增这行提示
        }
    }
    function jumpAt() {
        const val = document.getElementById('at-select').value;
        if (val) {
            window.open('https://atcoder.jp/users/' + val, '_blank');
        } else {
            alert('请先在下拉框里选择一个 AtCoder 账号！'); // 新增这行提示
        }
    }
</script>
</body>
</html>
