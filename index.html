<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XXh 的工具箱</title>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body {
            /* 换成绝对稳定的 Unsplash 背景图（解决了防盗链导致挂掉的问题） */
            background-image: url('https://ts1.tc.mm.bing.net/th/id/R-C.edac51727869a484d9925579785cda1a?rik=SMGJUZHreTATuQ&riu=http%3a%2f%2fimgs.aixifan.com%2flive%2f1483601963429%2f1483601963429.jpg&ehk=rFgZCrdJAA85TrfkYC52LkHEXCLB0zV4t098EJMnCaI%3d&risl=&pid=ImgRaw&r=0');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #f8fafc; /* 极简浅灰兜底色 */
            
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .container {
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }

        /* 头部功能区 */
        .header-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .theme-toggle-btn {
            background: rgba(255, 255, 255, 0.6);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .theme-toggle-btn:hover { background: rgba(255, 255, 255, 0.9); }

        .header-title {
            font-size: 2.8rem;
            font-weight: 700;
            color: #f2f5fa; /* 改成深色更好看 */
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .header-title i { font-size: 2.8rem; }
        .header-sub {
            color: #64748b;
            font-size: 0.95rem;
            letter-spacing: 4px;
            margin-bottom: 20px;
            border-top: 1px solid #94a3b8;
            border-bottom: 1px solid #94a3b8;
            display: inline-block;
            padding: 5px 15px;
        }

        /* 时钟展示 */
        #clock-display {
            color: #1e293b;
            font-weight: 500;
            font-size: 1.1rem;
            margin-bottom: 20px;
            margin-top: -15px;
        }

        /* 搜索框 */
        .search-wrapper {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }
        #search-box {
            padding: 10px 20px;
            width: 300px;
            border-radius: 40px;
            border: 1px solid #d1d9e6;
            background: rgba(255, 255, 255, 0.8);
            outline: none;
            text-align: center;
            font-size: 0.95rem;
            backdrop-filter: blur(4px);
        }
        #search-box:focus {
            border-color: #7c3aed;
            background: white;
        }
        
        /* 网格卡片布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            justify-content: center;
        }

        /* 单张卡片设计 */
        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0, 50, 100, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
            background: rgba(255, 255, 255, 0.9);
        }

        /* 图标区域 */
        .icon-wrapper {
            width: 68px;
            height: 68px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }
        .icon-blue { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .icon-orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .icon-green { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .icon-red { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .icon-purple { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }

        .card h3 {
            font-size: 1.15rem;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .card p {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 12px;
        }

        /* 下拉菜单和按钮样式 */
        .select-wrapper {
            width: 100%;
            margin-bottom: 8px;
        }
        .select-wrapper select {
            width: 90%;
            padding: 6px 8px;
            border-radius: 12px;
            border: 1px solid #d1d9e6;
            background: white;
            font-size: 0.85rem;
            color: #334155;
            outline: none;
        }
        .go-btn, .card-link {
            margin-top: 8px;
            display: inline-block;
            text-decoration: none;
            background: #e2e8f0;
            color: #475569;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .go-btn:hover, .card-link:hover {
            background: #cbd5e1;
        }
        .card-link {
            padding: 8px 25px;
            background: #1e293b;
            color: white;
        }
        .card-link:hover {
            background: #0f172a;
        }
        .footer-tip {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #94a3b8;
            opacity: 0.8;
        }
        /* 强制去掉所有图标的背景色、边框和阴影 */
        .icon-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
        }
        .icon-wrapper i {
            color: #1e293b !important;
        }

        /* ======= 暗色模式专属样式 ======= */
        body.dark-mode { background-color: #0f172a !important; }
        body.dark-mode .header-title { color: #e2e8f0 !important; }
        body.dark-mode #clock-display { color: #e2e8f0 !important; }
        body.dark-mode .header-sub { color: #94a3b8; border-color: #334155; }
        body.dark-mode #search-box { background: rgba(30, 41, 59, 0.7); color: white; border-color: #475569; }
        body.dark-mode .card {
            background: rgba(30, 41, 59, 0.85);
            border-color: #475569;
            box-shadow: none;
        }
        body.dark-mode .card h3 { color: #e2e8f0; }
        body.dark-mode .card p { color: #94a3b8; }
        body.dark-mode .icon-wrapper i { color: #e2e8f0 !important; }
        body.dark-mode .card-link:not(.go-btn) { background: #334155; color: #f1f5f9; }
        body.dark-mode .card-link:hover { background: #475569; }
    </style>
</head>
<body>
<div class="container">
    <!-- 功能：暗色模式切换 -->
    <div class="header-actions">
        <button id="theme-toggle" class="theme-toggle-btn">🌙 暗色模式</button>
    </div>

    <div class="header-title"><i class="fa-solid fa-toolbox"></i> 快速跳转 </div>
    <div class="header-sub">更便捷的打开方式</div>

    <!-- 功能：实时时钟 -->
    <div id="clock-display">⏰ 加载中...</div>

    <!-- 功能：卡片搜索框 -->
    <div class="search-wrapper">
        <input type="text" id="search-box" placeholder="🔍 搜索工具名称 (如 CF, 洛谷)...">
    </div>

    <div class="grid">
        <!-- 卡片 1：做题记录 -->
        <div class="card">
            <div class="icon-wrapper icon-blue"><i class="fa-solid fa-list-check"></i></div>
            <h3>做题记录</h3>
            <p>算法追踪 · 状态记录</p>
            <a href="/I-am-XXh.mz/icbp.html" class="card-link">📝 进入</a>
        </div>

        <!-- 卡片 2：博客园 -->
        <div class="card">
            <div class="icon-wrapper icon-orange" style="padding: 10px;">
                <img src="https://ts1.tc.mm.bing.net/th/id/ODF.J6leVzKhepVCqn16LLjyWg?w=32&h=32&qlt=90&pcl=fffffa&o=6&pid=1.2" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>博客园</h3>
            <p>文章记录 · 学习笔记</p>
            <a href="https://www.cnblogs.com/XXh0919" target="_blank" class="card-link">📖 前往</a>
        </div>

        <!-- 卡片 3：洛谷 -->
        <div class="card">
            <div class="icon-wrapper icon-green" style="padding: 10px;">
                <img src="https://fecdn.luogu.com.cn/columba/static.325908fec383795b.logo-single-color.svg" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>洛谷</h3>
            <p>国内在线题库</p>
            <a href="https://www.luogu.com.cn" target="_blank" class="card-link">💻 前往</a>
        </div>

        <!-- 卡片 4：Codeforces（带下拉框 + 主站链接） -->
        <div class="card">
            <div class="icon-wrapper icon-red" style="padding: 10px;">
                <img src="https://ts3.tc.mm.bing.net/th/id/ODF.PnqYzRrYxyP7VRy0DAYqsA?w=32&h=32&qlt=90&pcl=fffffa&o=6&pid=1.2" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>Codeforces</h3>
            <p>国外算法竞赛</p>
            <a href="https://codeforces.com/" target="_blank" style="display: inline-block; color: #64748b; font-size: 0.75rem; text-decoration: underline; margin: 0 0 8px 0;">🌐 主站首页</a>
            <div class="select-wrapper">
                <select id="cf-select">
                    <option value="">选择账号</option>
                    <option value="XXh0919">XXh0919</option>
                    <option value="Laoxu0919">Laoxu0919</option>
                </select>
            </div>
            <button class="go-btn" onclick="jumpCF()">🚀 前往账号</button>
        </div>

        <!-- 卡片 5：AtCoder（带下拉框 + 主站链接） -->
        <div class="card">
            <div class="icon-wrapper icon-purple" style="padding: 10px;">
                <img src="//img.atcoder.jp/assets/top/img/logo_bk.svg" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>AtCoder</h3>
            <p>国外算法竞赛</p>
            <a href="https://atcoder.jp/" target="_blank" style="display: inline-block; color: #64748b; font-size: 0.75rem; text-decoration: underline; margin: 0 0 8px 0;">🌐 主站首页</a>
            <div class="select-wrapper">
                <select id="at-select">
                    <option value="">选择账号</option>
                    <option value="XXh0919">XXh0919</option>
                    <option value="Laoxu0919">Laoxu0919</option>
                </select>
            </div>
            <button class="go-btn" onclick="jumpAt()">🚀 前往账号</button>
        </div>

        <!-- 卡片 6：我的 GitHub -->
        <div class="card">
            <div class="icon-wrapper" style="padding: 10px;">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>我的 GitHub</h3>
            <p>代码仓库 · 项目托管</p>
            <a href="https://github.com/XXh0919" target="_blank" class="card-link">💻 前往</a>
        </div>

        <!-- 卡片 7：UOJ -->
        <div class="card">
            <div class="icon-wrapper icon-green" style="padding: 10px;">
                <img src="https://uoj.ac/pictures/UOJ.png" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h3>UOJ</h3>
            <p>国内在线题库</p>
            <a href="https://uoj.ac/" target="_blank" class="card-link">💻 前往</a>
        </div>

        <!-- 卡片 8：正在构思 -->
        <div class="card">
            <div class="icon-wrapper icon-blue"><i class="fa-regular fa-lightbulb"></i></div>
            <h3>正在构思</h3>
            <p>更多项目开发中...</p>
            <a href="#" class="go-btn" style="background:#e2e8f0;">敬请期待</a>
        </div>
    </div>
    
    <div class="footer-tip">↑ 点击卡片快速跳转 ↑</div>
</div>

<!-- JS 逻辑：处理下拉框跳转、时钟、搜索、暗黑模式切换 -->
<script>
    // 1. 实时时钟
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
        document.getElementById('clock-display').innerText = `⏰ 当前时间：${timeStr}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // 2. 卡片搜索过滤
    document.getElementById('search-box').addEventListener('input', function() {
        const keyword = this.value.toLowerCase().trim();
        document.querySelectorAll('.grid .card').forEach(card => {
            const title = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = title.includes(keyword) ? 'flex' : 'none';
        });
    });

    // 3. 暗色模式切换
    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        themeBtn.innerText = document.body.classList.contains('dark-mode') ? '☀️ 白天模式' : '🌙 暗色模式';
    });

    // 4. CF 跳转
    function jumpCF() {
        const val = document.getElementById('cf-select').value;
        if (val) {
            window.open('https://codeforces.com/profile/' + val, '_blank');
        } else {
            alert('请先在下拉框里选择一个 Codeforces 账号！');
        }
    }
    // 5. AtCoder 跳转
    function jumpAt() {
        const val = document.getElementById('at-select').value;
        if (val) {
            window.open('https://atcoder.jp/users/' + val, '_blank');
        } else {
            alert('请先在下拉框里选择一个 AtCoder 账号！');
        }
    }
</script>
</body>
</html>
